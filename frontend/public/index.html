<!DOCTYPE html>
<html lang="en-IN">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <meta name="theme-color" content="#000000" />
    
    <!-- Primary Meta Tags -->
    <title>SHAN ASSOCIATES | Building Materials Supplier</title>
    <meta name="title" content="SHAN ASSOCIATES | Building Materials Supplier" />
    <meta
      name="description"
      content="SHAN ASSOCIATES provides expert legal advisory, corporate consulting, and compliance services tailored to businesses and individuals in India."
    />
    <meta name="keywords" content="legal services, corporate law, consulting, India, SHAN ASSOCIATES" />
    <meta name="author" content="SHAN ASSOCIATES" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.shanassociates.com/" />
    <meta property="og:title" content="SHAN ASSOCIATES | Professional Legal & Consulting Services" />
    <meta property="og:description" content="Expert legal advisory and corporate consulting services in India." />
    <meta property="og:image" content="%PUBLIC_URL%/og-image.png" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://www.shanassociates.com/" />
    <meta property="twitter:title" content="SHAN ASSOCIATES | Professional Legal & Consulting Services" />
    <meta property="twitter:description" content="Expert legal advisory and corporate consulting services in India." />
    <meta property="twitter:image" content="%PUBLIC_URL%/og-image.png" />

    <!-- Canonical URL (prevents duplicate content issues) -->
    <link rel="canonical" href="https://www.shanassociates.com/" />

    <!-- Apple Touch Icon -->
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />

    <!-- Web App Manifest -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- Preconnect to external origins (example for Google Fonts) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Optional: Add a no-js fallback message -->
    <noscript>
      <style>
        .no-js-message {
          text-align: center;
          padding: 2rem;
          font-family: sans-serif;
        }
      </style>
    </noscript>
  </head>
  <body>
    <noscript>
      <div class="no-js-message">
        <h1>JavaScript Required</h1>
        <p>Please enable JavaScript in your browser settings to view the SHAN ASSOCIATES website.</p>
      </div>
    </noscript>

    <div id="root">
      <!-- Optional: Inline loading spinner for perceived performance -->
      <style>
        .app-loader {
          display: flex;
          justify-content: center;
          align-items: center;
          height: 100vh;
          width: 100vw;
          background-color: #f5f5f5;
          font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        .app-loader-spinner {
          border: 4px solid rgba(0, 0, 0, 0.1);
          border-left-color: #000000;
          border-radius: 50%;
          width: 40px;
          height: 40px;
          animation: spin 1s linear infinite;
        }
        @keyframes spin {
          to { transform: rotate(360deg); }
        }
      </style>
      <div class="app-loader">
        <div class="app-loader-spinner"></div>
      </div>
    </div>
    <!-- The loading spinner will be replaced instantly when React hydrates -->
  </body>
</html>
